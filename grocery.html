<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Categories with Smart Search</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --primary-hover: #1b5e20;
            --bg-color: #f9f9f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --shadow: rgba(0, 0, 0, 0.08) 0px 4px 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
        }

        .category-container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .category-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .category-header h2 {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        /* Search Bar Styles */
        .search-wrapper {
            max-width: 500px;
            margin: 0 auto 30px auto;
            text-align: center;
        }

        .search-bar {
            width: 100%;
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }

        .search-bar:focus {
            border-color: var(--primary-color);
        }

        /* Grid Layout */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .category-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #eee;
            cursor: pointer;
            user-select: none;
        }

        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: rgba(0, 0, 0, 0.15) 0px 8px 24px;
        }

        /* Selected State */
        .category-card.selected {
            border-color: var(--primary-color);
            background-color: #e8f5e9;
            transform: scale(1.02);
        }

        .category-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .category-title {
            font-size: 1rem;
            font-weight: 600;
        }

        /* Action Footer for Submit Button */
        .action-footer {
            text-align: center;
            margin-top: 20px;
            min-height: 50px;
        }

        .submit-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(46, 125, 50, 0.3);
            transition: all 0.2s ease;
            display: none;
        }

        .submit-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* Popup / Modal Styles */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .popup-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .popup-box {
            background: white;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }

        .popup-overlay.active .popup-box {
            transform: scale(1);
        }

        .popup-box h3 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        .popup-box p {
            font-size: 1.1rem;
            margin: 15px 0 25px 0;
        }

        .close-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }

        .close-btn:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

<div class="category-container">
    <div class="category-header">
        <h2>Shop by Category</h2>
        <p>Type an item (like apple, milk, rice) or select a category directly</p>
    </div>

    <div class="search-wrapper">
        <input type="text" id="searchBar" class="search-bar" placeholder="Search items or categories (e.g., apple, milk, soap)...">
    </div>

    <div class="category-grid" id="categoryGrid">
        
        <div class="category-card" data-name="fruits" data-keywords="apple banana mango orange grapes berries pomegranate watermelon fruit">
            <span class="category-icon" role="img" aria-label="Fruits">🍎</span>
            <span class="category-title">Fruits</span>
        </div>

        <div class="category-card" data-name="vegetables" data-keywords="potato onion tomato broccoli carrot cabbage spinach vegetable veggies">
            <span class="category-icon" role="img" aria-label="Vegetables">🥦</span>
            <span class="category-title">Vegetables</span>
        </div>

        <div class="category-card" data-name="dairy & eggs" data-keywords="milk cheese butter paneer yogurt curd egg cream dairy">
            <span class="category-icon" role="img" aria-label="Dairy & Eggs">🥛</span>
            <span class="category-title">Dairy & Eggs</span>
        </div>

        <div class="category-card" data-name="rice, atta & grains" data-keywords="rice atta flour wheat oats quinoa grains basmati chakki">
            <span class="category-icon" role="img" aria-label="Rice, Atta & Grains">🍚</span>
            <span class="category-title">Rice, Atta & Grains</span>
        </div>

        <div class="category-card" data-name="pulses" data-keywords="dal pulses lentils chana moong rajma chickpeas beans">
            <span class="category-icon" role="img" aria-label="Pulses">🌾</span>
            <span class="category-title">Pulses</span>
        </div>

        <div class="category-card" data-name="oils & ghee" data-keywords="oil ghee mustard olive sunflower coconut oil fats">
            <span class="category-icon" role="img" aria-label="Oils & Ghee">🫒</span>
            <span class="category-title">Oils & Ghee</span>
        </div>

        <div class="category-card" data-name="spices & masalas" data-keywords="salt pepper turmeric chilli powder cumin coriander spices masalas haldi">
            <span class="category-icon" role="img" aria-label="Spices & Masalas">🧂</span>
            <span class="category-title">Spices & Masalas</span>
        </div>

        <div class="category-card" data-name="bakery" data-keywords="bread bun cake cookies toast pav bakery baked brown bread">
            <span class="category-icon" role="img" aria-label="Bakery">🍞</span>
            <span class="category-title">Bakery</span>
        </div>

        <div class="category-card" data-name="snacks" data-keywords="chips chips biscuits namkeen popcorn chocolate mixture snacks kurkure">
            <span class="category-icon" role="img" aria-label="Snacks">🍪</span>
            <span class="category-title">Snacks</span>
        </div>

        <div class="category-card" data-name="beverages" data-keywords="coffee tea juice soda cold drink water energy drink beverages drink">
            <span class="category-icon" role="img" aria-label="Beverages">☕</span>
            <span class="category-title">Beverages</span>
        </div>

        <div class="category-card" data-name="household" data-keywords="soap detergent cleaner phenyl scrubber garbage bag dishwash household cleaner">
            <span class="category-icon" role="img" aria-label="Household">🧼</span>
            <span class="category-title">Household</span>
        </div>

        <div class="category-card" data-name="personal care" data-keywords="shampoo brush toothpaste lotion cream face wash deodorant personal care sanitizer">
            <span class="category-icon" role="img" aria-label="Personal Care">🧴</span>
            <span class="category-title">Personal Care</span>
        </div>
        
    </div>

    <div class="action-footer">
        <button id="submitBtn" class="submit-btn">Submit Selection</button>
    </div>
</div>

<div class="popup-overlay" id="popupOverlay">
    <div class="popup-box">
        <h3>Success!</h3>
        <p id="popupMessage">You have selected a category.</p>
        <button class="close-btn" id="closePopupBtn">Close</button>
    </div>
</div>

<script>
    const searchBar = document.getElementById('searchBar');
    const cards = document.querySelectorAll('.category-card');
    const submitBtn = document.getElementById('submitBtn');
    const popupOverlay = document.getElementById('popupOverlay');
    const popupMessage = document.getElementById('popupMessage');
    const closePopupBtn = document.getElementById('closePopupBtn');
    
    let selectedCategory = "";

    // 1. Smart Real-time Search Filtering (checks names + keywords)
    searchBar.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        
        cards.forEach(card => {
            const name = card.getAttribute('data-name');
            const keywords = card.getAttribute('data-keywords');
            
            // Check if the query matches the title OR any of the item keywords
            if (name.includes(query) || keywords.includes(query)) {
                card.style.display = 'flex';
            } else {
                card.style.display = 'none';
            }
        });
    });

    // 2. Selection logic & showing submit button
    cards.forEach(card => {
        card.addEventListener('click', () => {
            cards.forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            selectedCategory = card.querySelector('.category-title').textContent;
            submitBtn.style.display = 'inline-block';
        });
    });

    // 3. Submit and show Popup
    submitBtn.addEventListener('click', () => {
        if(selectedCategory) {
            popupMessage.innerHTML = `You successfully processed: <strong>${selectedCategory}</strong>`;
            popupOverlay.classList.add('active');
        }
    });

    // 4. Close Popup
    closePopupBtn.addEventListener('click', () => {
        popupOverlay.classList.remove('active');
    });

    popupOverlay.addEventListener('click', (e) => {
        if(e.target === popupOverlay) {
            popupOverlay.classList.remove('active');
        }
    });
</script>

</body>
</html>
